<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif;color:white;}

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:0.6s;
}
.page.active{opacity:1;z-index:10;}

img{max-width:100%;max-height:100%;object-fit:contain;}

.text{
font-size:1.4rem;
text-align:center;
padding:20px;
line-height:1.5;
}

.big{
font-size:3rem;
color:#ff4da6;
animation:glow 1s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 10px #ff4da6;}
to{text-shadow:0 0 30px #ff4da6;}
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
z-index:50;
}
button{
padding:12px 20px;
border:none;
border-radius:30px;
background:#ff4da6;
color:white;
}

.heart{
position:fixed;
color:#ff4da6;
animation:fall linear;
}
@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

.cake{font-size:4rem;animation:pop 1s infinite alternate;}
@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.2);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>
<div id="container"></div>

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="toggleMusic()">Music</button>
</div>

<script>
let pages=[], i=0, music=document.getElementById("music"), playing=false;

function addPage(html){
let d=document.createElement("div");
d.className="page";
d.innerHTML=html;
container.appendChild(d);
pages.push(d);
}

/* TYPE ANIMATION */
function type(el,text,speed=35){
let i=0;
el.innerHTML="";
let int=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(int);
},speed);
}

/* 💖 MESSAGE PAGES */
let msgs=[
"Mnku ji ❤️",
"Aaj ka din normal nahi hai...",
"Kyuki aaj duniya ki sabse pyaari ladki ka birthday hai 💖",
"Aap meri life ka sabse beautiful part ho...",
"Sach bolu to... aapke bina sab adhoora lagta hai...",
"Aapki smile... meri weakness hai 😭❤️",
"Jab bhi aap haste ho na... dil khush ho jata hai 💘",
"Aap sirf special nahi ho...",
"Aap meri aadat ban chuki ho ❤️",
"Main har din bas ye chahta hu...",
"Ki aap hamesha khush raho 💖",
"Chahe kuch bhi ho jaye...",
"Main hamesha aapke saath rahunga ❤️",
"Aap meri duniya ho...",
"Mera sab kuch ho 💘",
"Aur aaj ka din sirf aapke naam ❤️"
];

msgs.forEach(m=>{
addPage(`<div class="text" id="t${pages.length}"></div>`);
setTimeout(()=>{
let el=document.querySelectorAll(".text")[pages.length-1];
type(el,m);
},500);
});

/* 📸 PHOTOS */
["her1.jpg","her2.jpg","her3.jpg","her4.jpg","her5.jpg","her6.jpg","her7.jpg","her8.jpg",
"us1.jpg","us2.jpg","us3.jpg","us4.jpg","us5.jpg"]
.forEach(p=>addPage(`<img src="${p}">`));

/* 🎬 VIDEOS */
addPage(`<video src="v1.mp4" autoplay loop muted style="width:100%"></video>`);
addPage(`<video src="v2.mp4" autoplay loop muted style="width:100%"></video>`);

/* 🎂 CAKE ANIMATION */
addPage(`<div class="text"><div class="cake">🎂</div>Make a wish Mnku ji 💖</div>`);

/* 🎂 CAKE VIDEO */
addPage(`<video src="cake.mp4" autoplay loop muted style="width:100%"></video>`);

/* 💌 MESSAGE VIDEO */
addPage(`<video src="msg.mp4" autoplay loop muted style="width:100%"></video>`);

/* 💘 FINAL */
addPage(`
<div class="text">
<div class="big">I LOVE YOU ❤️</div>
Happy Birthday Mnku ji 💖<br>
Aap meri life ka sabse important part ho ❤️<br>
Aur hamesha rahoge 💘
</div>
`);

/* NAV */
function show(n){
pages.forEach(p=>p.classList.remove("active"));
pages[n].classList.add("active");
}
show(0);

function next(){ if(i<pages.length-1){i++;show(i);} }
function prev(){ if(i>0){i--;show(i);} }

/* MUSIC */
function toggleMusic(){
playing ? music.pause() : music.play();
playing=!playing;
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);
</script>

</body>
</html>
