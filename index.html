<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(135deg,#ff4da6,#000);
color:white;
overflow:hidden;
}

.page{
position:absolute;
top:0;left:0;
width:100%;height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
opacity:0;
transition:0.5s;
}
.active{opacity:1;}

img,video{
width:90%;
max-height:70vh;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.text{
font-size:1.5rem;
text-align:center;
padding:20px;
}

.caption{
margin-top:10px;
color:#ffd1e6;
}

.controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:center;
gap:10px;
}

button{
padding:10px 15px;
border:none;
border-radius:20px;
background:#ff4da6;
color:white;
font-size:15px;
}

.big{
font-size:2.5rem;
color:#fff;
text-shadow:0 0 20px #ff4da6;
}

</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div id="container"></div>

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="musicToggle()">Music</button>
</div>

<script>

let container=document.getElementById("container");
let pages=[];
let index=0;

function add(content){
let div=document.createElement("div");
div.className="page";
div.innerHTML=content;
container.appendChild(div);
pages.push(div);
}

/* INTRO */
add(`
<div class="text">
<h1 class="big">Mnku ji ❤️</h1>
Aaj ka din normal nahi hai... 💖<br><br>
Kyuki aaj meri duniya ki sabse pyaari ladki ka birthday hai ❤️
</div>
`);

/* MESSAGES */
[
"Aap meri life ki sabse beautiful feeling ho 💖",
"Aapki smile meri sabse badi weakness hai 😭❤️",
"Jab bhi aap haste ho sab perfect lagta hai 💞",
"Aap meri aadat ban chuke ho 💘",
"Aap bina sab adhoora lagta hai 💔"
].forEach(t=>{
add(`<div class="text">${t}</div>`);
});

/* PHOTOS (SAFE LOAD) */
function imgPage(src,text){
add(`
<img src="${src}" onerror="this.src='https://picsum.photos/400/600'">
<div class="caption">${text}</div>
`);
}

imgPage("her1.jpg","Only you 💖");
imgPage("her2.jpg","How cute 😭❤️");
imgPage("her3.jpg","Meri pyari si duniya 💞");

imgPage("us1.jpg","Beautiful moment ❤️");
imgPage("us2.jpg","Perfect together 💘");

/* VIDEOS */
add(`<video src="v1.mp4" autoplay muted loop></video><div class="caption">Memories ❤️</div>`);
add(`<video src="usv1.mp4" autoplay muted loop></video><div class="caption">Us ❤️</div>`);

/* CAKE */
add(`<video src="cake.mp4" controls autoplay></video>`);

/* MESSAGE VIDEO */
add(`<video src="msg.mp4" controls autoplay></video>`);

/* FINAL */
add(`
<div class="text">
Aap meri life ka sabse important part ho ❤️<br><br>
<h1 class="big">I LOVE YOU ❤️</h1>
</div>
`);

function show(i){
pages.forEach(p=>p.classList.remove("active"));
pages[i].classList.add("active");
}

function next(){
if(index<pages.length-1){
index++;
show(index);
}
}

function prev(){
if(index>0){
index--;
show(index);
}
}

show(0);

let music=document.getElementById("music");
let playing=false;

function musicToggle(){
playing?music.pause():music.play();
playing=!playing;
}

</script>

</body>
</html>
