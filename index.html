<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body{margin:0;overflow:hidden;font-family:sans-serif;background:black;}

.page{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background-size:cover;
background-position:center;
opacity:0;
transition:0.6s;
}

.page.active{opacity:1;}

.text{
color:white;
font-size:1.5em;
text-align:center;
padding:20px;
text-shadow:0 0 10px black;
}

img,video{
width:100%;
height:100%;
object-fit:cover;
}

.btns{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4da6;
color:white;
font-size:1em;
}

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
}

.heart{
position:absolute;
animation:fall linear;
}
@keyframes fall{
0%{transform:translateY(-100vh);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>
<div class="hearts" id="hearts"></div>

<!-- PAGES -->

<div class="page active" style="background:url(bg1.jpg)">
<div class="text" id="t1"></div>
</div>

<div class="page"><img src="her1.jpg"></div>
<div class="page"><img src="her2.jpg"></div>
<div class="page"><img src="her3.jpg"></div>
<div class="page"><img src="her4.jpg"></div>
<div class="page"><img src="her5.jpg"></div>
<div class="page"><img src="her6.jpg"></div>
<div class="page"><img src="her7.jpg"></div>
<div class="page"><img src="her8.jpg"></div>

<div class="page"><img src="us1.jpg"></div>
<div class="page"><img src="us2.jpg"></div>
<div class="page"><img src="us3.jpg"></div>
<div class="page"><img src="us4.jpg"></div>
<div class="page"><img src="us5.jpg"></div>

<div class="page"><video src="v1.mp4" autoplay muted loop></video></div>
<div class="page"><video src="v2.mp4" autoplay muted loop></video></div>

<div class="page"><video src="usv1.mp4" autoplay muted loop></video></div>
<div class="page"><video src="usv2.mp4" autoplay muted loop></video></div>

<div class="page"><video src="msg.mp4" autoplay muted loop></video></div>

<div class="page">
<video src="cake.mp4" autoplay muted loop></video>
<div class="text" id="last"></div>
</div>

<!-- BUTTONS -->
<div class="btns">
<button onclick="prev()">⬅ Prev</button>
<button onclick="next()">Next ➡</button>
</div>

<script>

let pages=document.querySelectorAll(".page");
let i=0;

function show(n){
pages[i].classList.remove("active");
i=n;
pages[i].classList.add("active");
}

function next(){
if(i<pages.length-1){
show(i+1);
}
}

function prev(){
if(i>0){
show(i-1);
}
}

// TYPE TEXT
function type(id,text){
let el=document.getElementById(id);
let i=0;
let int=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(int);
},40);
}

// START TEXT
type("t1","Mnku ji ❤️\n\nAaj ka din normal nahi hai...\nkyunki aaj duniya ki sabse pyaari ladki ka birthday hai...\n\nAur main bas itna kehna chahta hu...\naap mere liye bohot special ho ❤️");

// LAST PAGE TEXT
setTimeout(()=>{
type("last","Happy Birthday Mnku ji ❤️\n\nI love you ❤️\n\nAap hamesha aise hi smile karti raho...");
},1000);

// MUSIC AUTO
setTimeout(()=>{
document.getElementById("music").play();
},1000);

// HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.getElementById("hearts").appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
