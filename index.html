 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Mnku ji ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;overflow:hidden;background:black;}

.page{
position:absolute;
width:100%;
height:100vh;
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
opacity:0;
transition:1s;
}

.page.active{opacity:1;z-index:10;}

.content{
text-align:center;
color:white;
text-shadow:0 0 10px black;
padding:20px;
}

.title{font-size:2.5em;margin-bottom:20px;color:#ff4da6;}

.line{font-size:1.4em;margin:10px 0;}

.btn{
background:#ff4da6;
border:none;
padding:12px 25px;
border-radius:30px;
color:white;
font-size:1.2em;
margin-top:20px;
}

img,video{
width:90%;
max-width:300px;
border-radius:15px;
margin:10px;
}

.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.hearts{position:fixed;width:100%;height:100%;pointer-events:none;}
.heart{
position:absolute;
font-size:20px;
animation:fall linear forwards;
}
@keyframes fall{
0%{transform:translateY(-100vh);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>
<div class="hearts" id="hearts"></div>

<script>

let pages=document.querySelectorAll(".page");
let current=0;

function show(i){
pages[current].classList.remove("active");
current=i;
pages[current].classList.add("active");
}

function start(){
document.getElementById("music").play();
next();
}

function next(){
if(current<pages.length-1){
show(current+1);
runText(current);
}
}

setInterval(()=>{ if(current>0) next(); },6000);

// TYPEWRITER
function type(id,text){
let el=document.getElementById(id);
let i=0;
let int=setInterval(()=>{
el.innerHTML+=text[i];
i++;
if(i>=text.length) clearInterval(int);
},40);
}

// TEXT FLOW
function runText(p){
if(p==1){
type("p2l1","Aaj ka din normal nahi hai...");
type("p2l2","kyunki aaj ek bohot special insaan ka birthday hai...");
type("p2l3","jo mere liye sabse important hai...");
}
if(p==2){
type("p3l1","aaj duniya ki sabse pyaari ladki ka birthday hai ❤️");
type("p3l2","jo sabko khush rakhti hai...");
type("p3l3","aur khud itni pyari smile karti hai...");
}
if(p==3){
type("p4l1","main bas ye chahta hu...");
type("p4l2","ki aaj ka din unke liye perfect ho...");
type("p4l3","aur wo hamesha smile kare...");
}
if(p==4){
type("p5l1","unki ye smile...");
type("p5l2","sach me sabse alag hai...");
}
if(p==5){
type("p6l1","jab bhi unhe dekhta hu...");
type("p6l2","dil khush ho jata hai...");
}
if(p==6){
type("p7l1","aap bohot special ho...");
type("p7l2","aur hamesha rahoge...");
}
if(p==7){
type("p8l1","ye moments...");
type("p8l2","mere liye sabse precious hai...");
}
if(p==8){
type("p9l1","main bas ye chahta hu...");
type("p9l2","ye moments kabhi khatam na ho...");
}
if(p==9){
type("p10l1","ye choti choti yaadein...");
type("p10l2","mere liye sab kuch hai...");
}
if(p==10){
type("p11l1","aur ye special message...");
type("p11l2","sirf aapke liye hai...");
}
if(p==11){
type("p12l1","aap mere liye bohot special ho...");
type("p12l2","I love you ❤️");
}
}

// PAGE 1 TEXT
type("l1","aaj ka din mere liye bohot special hai...");
type("l2","maine aapke liye kuch banaya hai...");

// HEARTS
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.getElementById("hearts").appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>
