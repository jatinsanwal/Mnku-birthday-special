<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden;}

.page{
position:absolute;top:0;left:0;width:100%;height:100vh;
display:flex;justify-content:center;align-items:center;
flex-direction:column;opacity:0;transition:0.6s;
}
.active{opacity:1;}

img,video{
width:100%;height:100%;
object-fit:contain;background:black;
}

.text{padding:20px;font-size:1.6rem;text-align:center;}

.big{
font-size:3rem;color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
}

.controls{
position:fixed;bottom:20px;width:100%;
display:flex;justify-content:center;gap:10px;
}
button{
padding:10px 18px;border:none;border-radius:25px;
background:#ff4da6;color:white;font-size:15px;
}

.heart{
position:fixed;color:#ff4da6;
animation:fall linear;
}
@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div id="container"></div>

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="musicToggle()">Music</button>
</div>

<script>
let c=document.getElementById("container");
let pages=[],i=0;

/* ADD PAGE */
function add(html){
let d=document.createElement("div");
d.className="page";
d.innerHTML=html;
c.appendChild(d);
pages.push(d);
}

/* FIRST PAGE */
add(`
<div class="text">
<h2 style="color:#ff4da6;">Mnku ji ❤️</h2>
Aaj ka din normal nahi hai... 💖<br><br>
Kyuki aaj meri duniya ki sabse pyaari ladki ka birthday hai ❤️
</div>`);

/* SWEET MESSAGES */
[
"Aap meri life ki sabse beautiful feeling ho 💖",
"Jab bhi aap haste ho sab perfect lagta hai 😭❤️",
"Main aapko kabhi khona nahi chahta 💔",
"Aap meri aadat ban chuke ho 💞",
"Aapke bina sab adhoora lagta hai 💖",
"Main hamesha aapko khush dekhna chahta hu ❤️",
"Aap meri duniya ho 💘"
].forEach(t=>add(`<div class="text">${t}</div>`));

/* PHOTOS (ALL) */
let photos=[
"her1.jpg","her2.jpg","her3.jpg","her4.jpg","her5.jpg","her6.jpg","her7.jpg","her8.jpg",
"us1.jpg","us2.jpg","us3.jpg","us4.jpg","us5.jpg"
];
photos.forEach(p=>add(`<img src="${p}">`));

/* VIDEOS */
["v1.mp4","v2.mp4","usv1.mp4","usv2.mp4"].forEach(v=>{
add(`<video src="${v}" autoplay muted loop playsinline></video>`);
});

/* CAKE ANIMATION */
add(`<div class="text"><h1>🎂</h1>Make a wish Mnku ji 💖</div>`);

/* CAKE VIDEO */
add(`<video src="cake.mp4" autoplay muted loop playsinline></video>`);

/* MSG VIDEO */
add(`<video src="msg.mp4" autoplay muted loop playsinline></video>`);

/* FINAL PAGE */
add(`
<div class="text">
<div class="big">I LOVE YOU MNKU JI ❤️</div><br>
Happy Birthday ❤️<br>
Aap meri sab kuch ho 💖
</div>`);

/* NAVIGATION */
function show(n){
pages.forEach(p=>p.classList.remove("active"));
pages[n].classList.add("active");
}
show(0);

function next(){if(i<pages.length-1){i++;show(i)}}
function prev(){if(i>0){i--;show(i)}}

/* MUSIC */
let m=document.getElementById("music"),play=false;
function musicToggle(){
if(play){m.pause()}else{m.play()}
play=!play;
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
