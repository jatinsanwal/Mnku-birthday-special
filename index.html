<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body {
    margin:0;
    font-family: sans-serif;
    text-align:center;
    color:white;
    background: linear-gradient(135deg,#ff4e8a,#7a003c);
}

/* HEARTS */
.heart {
    position:fixed;
    top:-10px;
    color:red;
    animation:fall 6s linear infinite;
}
@keyframes fall {
    to { transform:translateY(100vh); }
}

/* CONTENT */
.container {
    padding:20px;
}

h1 {
    font-size:40px;
    color:#ff3f87;
}

/* IMAGE / VIDEO */
.media {
    width:90%;
    max-height:60vh;
    object-fit:cover;
    border-radius:20px;
}

/* CAPTION */
.caption {
    font-size:20px;
    margin:10px;
}

/* BUTTONS */
.buttons {
    position:fixed;
    bottom:20px;
    width:100%;
}
button {
    padding:12px 20px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#ff3f87;
    color:white;
    font-size:16px;
}

/* CAKE */
.cake {
    font-size:60px;
}
</style>

</head>
<body>

<div id="hearts"></div>

<div class="container">

<h1>Mnku ji ❤️</h1>

<p id="text">Aaj ka din normal nahi hai...</p>

<img id="photo" class="media" src="her1.jpg">

<video id="video" class="media" controls style="display:none"></video>

<p class="caption" id="caption">Only you ❤️</p>

</div>

<div class="buttons">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="music()">Music</button>
</div>

<audio id="bgmusic" src="music.mp3"></audio>

<script>

/* ❤️ HEARTS */
function createHearts(){
    let h = document.createElement("div");
    h.innerHTML="❤️";
    h.className="heart";
    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(15+Math.random()*20)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),6000);
}
setInterval(createHearts,300);


/* 📸 ALL CONTENT */
let data = [

{type:"text", text:"Aaj ka din normal nahi hai... 💖"},
{type:"text", text:"Kyuki aaj meri duniya ki sabse pyaari ladki ka birthday hai ❤️"},
{type:"text", text:"Aap meri life ki sabse beautiful feeling ho 💕"},
{type:"text", text:"Aapki smile meri duniya hai 😍"},

{type:"img", src:"her1.jpg", cap:"Only you ❤️"},
{type:"img", src:"her2.jpg", cap:"Kitni cute ho aap 🥺"},
{type:"img", src:"her3.jpg", cap:"My favorite person 💗"},
{type:"img", src:"her4.jpg", cap:"Bas aap hi aap ❤️"},

{type:"img", src:"us1.jpg", cap:"Our beautiful moment ❤️"},
{type:"img", src:"us2.jpg", cap:"Best memory together 💞"},

{type:"video", src:"v1.mp4", cap:"Your cute video 💕"},
{type:"video", src:"usv1.mp4", cap:"Our memories 💖"},

{type:"cake"},
{type:"video", src:"cake.mp4", cap:"Birthday celebration 🎂"},
{type:"video", src:"msg.mp4", cap:"Special message 💌"},

{type:"text", text:"Aap meri duniya ho... ❤️"},
{type:"text", text:"I Love You So Much ❤️❤️❤️"}

];

let i=0;

function show(){
    let item=data[i];

    let photo=document.getElementById("photo");
    let video=document.getElementById("video");
    let text=document.getElementById("text");
    let cap=document.getElementById("caption");

    photo.style.display="none";
    video.style.display="none";

    if(item.type=="text"){
        text.innerHTML=item.text;
        cap.innerHTML="";
    }

    if(item.type=="img"){
        text.innerHTML="";
        photo.src=item.src;
        photo.style.display="block";
        cap.innerHTML=item.cap;
    }

    if(item.type=="video"){
        text.innerHTML="";
        video.src=item.src;
        video.style.display="block";
        video.play();
        cap.innerHTML=item.cap;
    }

    if(item.type=="cake"){
        text.innerHTML="🎂 Make a wish... blow candle 🎉";
        cap.innerHTML="Tap Next ❤️";
    }
}

function next(){
    i++;
    if(i>=data.length) i=0;
    show();
}

function prev(){
    i--;
    if(i<0) i=data.length-1;
    show();
}

function music(){
    let m=document.getElementById("bgmusic");
    if(m.paused) m.play();
    else m.pause();
}

show();

</script>

</body>
</html>
