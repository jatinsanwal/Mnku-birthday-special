<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Mnku ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
overflow:hidden;
}

/* COMMON PAGE */
.page{
width:100%;
height:100vh;
position:absolute;
top:0;
left:0;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
padding:20px;
}

.active{
display:flex;
}

/* BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:-1;
}

/* TEXT */
h1{
font-size:8vw;
margin-bottom:20px;
}

p{
font-size:5vw;
max-width:90%;
}

/* BUTTON */
.btn{
margin-top:25px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff6b81;
color:white;
font-size:4vw;
}

/* IMAGE FULL SCREEN */
.full-img{
width:100%;
height:100vh;
object-fit:cover;
border-radius:15px;
}

/* HEARTS */
.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active">
<div class="bg" style="background-image:url('bg1.jpg')"></div>

<h1>Mnku ji... ❤️</h1>
<p id="typing"></p>

<button class="btn" onclick="nextPage()">Enter 👀</button>
<button class="btn" onclick="playMusic()">🎵 Music</button>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="bg" style="background-image:url('bg2.jpg')"></div>

<p id="typing2"></p>
<button class="btn" onclick="nextPage()">Next</button>
</div>

<!-- PAGE 3 (PHOTOS) -->
<div class="page">
<img src="img1.jpg" class="full-img">
<button class="btn" onclick="nextPage()">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page">
<img src="img2.jpg" class="full-img">
<button class="btn" onclick="nextPage()">Next</button>
</div>

<!-- PAGE 5 (VIDEO + SKIP) -->
<div class="page">
<video id="video" width="100%" height="100%" autoplay>
<source src="video.mp4" type="video/mp4">
</video>

<button class="btn" onclick="nextPage()">Skip ➡️</button>
</div>

<!-- PAGE 6 FINAL -->
<div class="page">
<div class="bg" style="background-image:url('bg3.jpg')"></div>

<h1>Happy Birthday ❤️</h1>
<p>Tu mere liye bohot special hai 😘</p>
</div>

<!-- MUSIC -->
<audio id="music" src="music.mp3"></audio>

<script>
let pages=document.querySelectorAll(".page");
let current=0;

function nextPage(){
pages[current].classList.remove("active");
current++;
if(current<pages.length){
pages[current].classList.add("active");
}
}

/* MUSIC */
function playMusic(){
let music=document.getElementById("music");
music.play();
}

/* TYPING EFFECT */
let text1="tumhare liye kuch bohot special banaya hai... aaj bas aaram se dekhna 😊";
let i=0;

function type1(){
if(i<text1.length){
document.getElementById("typing").innerHTML+=text1.charAt(i);
i++;
setTimeout(type1,40);
}
}
type1();

let text2="Aaj ka din normal nahi hai... kyunki aaj duniya ki sabse pyari ladki ka birthday hai ❤️";
let j=0;

function type2(){
if(j<text2.length){
document.getElementById("typing2").innerHTML+=text2.charAt(j);
j++;
setTimeout(type2,40);
}
}
setTimeout(type2,1500);

/* HEARTS */
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);
},300);
</script>

</body>
</html>
