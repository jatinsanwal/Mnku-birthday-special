<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnku ji ❤️</title>

<style>
body{margin:0;font-family:sans-serif;overflow:hidden;color:#fff;}

.page{
position:absolute;top:0;left:0;width:100%;height:100vh;
display:flex;justify-content:center;align-items:center;
flex-direction:column;
background-size:cover;background-position:center;
opacity:0;transition:0.6s;
}
.active{opacity:1;}

.overlay{
position:absolute;width:100%;height:100%;
background:rgba(0,0,0,0.5);
}

.text{
position:relative;
font-size:1.6rem;
text-align:center;
padding:20px;
z-index:2;
}

.big{
font-size:3rem;color:#ff4da6;
text-shadow:0 0 20px #ff4da6;
}

img,video{
max-width:100%;
max-height:80vh;
border-radius:15px;
z-index:2;
}

.caption{
margin-top:10px;
font-size:1.2rem;
color:#ff85c1;
}

.controls{
position:fixed;bottom:20px;width:100%;
display:flex;justify-content:center;gap:10px;
z-index:5;
}
button{
padding:10px 18px;border:none;border-radius:25px;
background:#ff4da6;color:white;font-size:15px;
}

/* HEARTS */
.heart{
position:fixed;color:#ff4da6;
animation:fall linear;
}
@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

/* CAKE */
.cake{
font-size:80px;
animation:pop 1s infinite alternate;
}
@keyframes pop{
from{transform:scale(1);}
to{transform:scale(1.2);}
}
</style>
</head>

<body>

<audio id="music" src="music.mp3" loop></audio>

<div id="container"></div>

<div class="controls">
<button onclick="prev()">Prev</button>
<button onclick="next()">Next</button>
<button onclick="musicToggle()">Music</button>
</div>

<script>
let c=document.getElementById("container");
let pages=[],i=0;

function add(html,bg){
let d=document.createElement("div");
d.className="page";
d.style.backgroundImage=`url(${bg})`;
d.innerHTML=`<div class="overlay"></div>`+html;
c.appendChild(d);
pages.push(d);
}

/* FIRST PAGE */
add(`
<div class="text">
<h2 class="big">Mnku ji ❤️</h2>
Aaj ka din normal nahi hai... 💖<br><br>
Kyuki aaj meri duniya ki sabse pyaari ladki ka birthday hai ❤️
</div>`,"bg1.jpg");

/* HER PHOTOS */
let her=["her1.jpg","her2.jpg","her3.jpg","her4.jpg","her5.jpg","her6.jpg","her7.jpg","her8.jpg"];
her.forEach((p,i)=>{
add(`
<img src="${p}">
<div class="caption">${i%2==0?"Only you 💖":"How cute yrr 😭❤️"}</div>
`,"bg2.jpg");
});

/* US PHOTOS */
let us=["us1.jpg","us2.jpg","us3.jpg","us4.jpg","us5.jpg"];
us.forEach(p=>{
add(`
<img src="${p}">
<div class="caption">Beautiful moments ❤️✨</div>
`,"bg3.jpg");
});

/* VIDEOS (EDIT) */
["v1.mp4","v2.mp4","usv1.mp4","usv2.mp4"].forEach(v=>{
add(`<video src="${v}" autoplay loop controls></video>`,"bg4.jpg");
});

/* CAKE ANIMATION */
add(`
<div class="text">
<div class="cake">🎂</div>
Make a wish Mnku ji 💖<br>
✨ Blow the candle ✨
</div>`,"bg5.jpg");

/* CAKE VIDEO (SOUND ON) */
add(`<video src="cake.mp4" autoplay controls></video>`,"bg6.jpg");

/* MSG VIDEO (SOUND ON) */
add(`<video src="msg.mp4" autoplay controls></video>`,"bg7.jpg");

/* FINAL PAGE */
add(`
<div class="text">
<div class="big">I LOVE YOU MNKU JI ❤️</div><br>
Happy Birthday ❤️<br>
Aap meri sab kuch ho 💖
</div>`,"bg8.jpg");

/* NAV */
function show(n){
pages.forEach(p=>p.classList.remove("active"));
pages[n].classList.add("active");
}
show(0);

function next(){if(i<pages.length-1){i++;show(i)}}
function prev(){if(i>0){i--;show(i)}}

/* MUSIC */
let m=document.getElementById("music"),play=false;
function musicToggle(){
play?m.pause():m.play();
play=!play;
}

/* HEARTS */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
