<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;font-family:sans-serif;}

.page{
position:absolute;
width:100%;
height:100vh;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

.active{display:flex;}

.bg{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
z-index:-1;
filter:brightness(0.7);
}

/* TEXT */
h1{font-size:9vw;}
p{font-size:5.5vw;padding:20px;line-height:1.4;}

/* BUTTON */
.btn{
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:5vw;
margin-top:20px;
}

/* IMAGE */
img{
width:90%;
border-radius:20px;
margin:10px;
}

/* VIDEO */
video{
width:90%;
border-radius:20px;
}

/* HEART */
.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(100vh);}
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div class="page active">
<div class="bg" style="background-image:url('bg1.jpg')"></div>
<h1>Mnku ji ❤️</h1>
<p>tumhare liye kuch bohot special banaya hai...</p>
<button class="btn" onclick="next()">Start</button>
<button class="btn" onclick="music()">Music</button>
</div>

<!-- PAGE 2 -->
<div class="page">
<div class="bg" style="background-image:url('bg2.jpg')"></div>
<p>Aaj ka din normal nahi hai...</p>
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page">
<div class="bg" style="background-image:url('bg3.jpg')"></div>
<p>kyunki aaj duniya ki sabse pyaari ladki ka birthday hai ❤️</p>
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page">
<div class="bg" style="background-image:url('bg4.jpg')"></div>
<p>aur main chahta hu ki ye din unke liye hamesha yaadgar rahe...</p>
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 5 (HER PHOTOS) -->
<div class="page">
<div class="bg" style="background-image:url('bg5.jpg')"></div>
<img src="her1.jpg">
<img src="her2.jpg">
<img src="her3.jpg">
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 6 -->
<div class="page">
<div class="bg" style="background-image:url('bg6.jpg')"></div>
<img src="her4.jpg">
<img src="her5.jpg">
<img src="her6.jpg">
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 7 -->
<div class="page">
<div class="bg" style="background-image:url('bg7.jpg')"></div>
<img src="her7.jpg">
<img src="her8.jpg">
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 8 (US PHOTOS) -->
<div class="page">
<div class="bg" style="background-image:url('bg8.jpg')"></div>
<img src="us1.jpg">
<img src="us2.jpg">
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 9 -->
<div class="page">
<div class="bg" style="background-image:url('bg9.jpg')"></div>
<img src="us3.jpg">
<img src="us4.jpg">
<img src="us5.jpg">
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 10 (VIDEO) -->
<div class="page">
<div class="bg" style="background-image:url('bg10.jpg')"></div>
<video src="v1.mp4" controls></video>
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 11 -->
<div class="page">
<div class="bg" style="background-image:url('bg11.jpg')"></div>
<video src="v2.mp4" controls></video>
<button class="btn" onclick="next()">Next</button>
</div>

<!-- PAGE 12 FINAL -->
<div class="page">
<div class="bg" style="background-image:url('bg12.jpg')"></div>
<h1>Happy Birthday ❤️</h1>
<p>tum mere liye bohot special ho...</p>
</div>

<audio id="m" src="music.mp3"></audio>

<script>
let pages=document.querySelectorAll(".page");
let i=0;

function next(){
pages[i].classList.remove("active");
i++;
pages[i].classList.add("active");
}

function music(){
document.getElementById("m").play();
}

/* HEART */
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
h.style.fontSize=(Math.random()*20+10)+"px";
h.style.animationDuration=(Math.random()*3+2)+"s";
document.body.appendChild(h);

setTimeout(()=>{h.remove();},5000);
},300);
</script>

</body>
</html>
