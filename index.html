<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mnku ji ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', 'Georgia', serif;
            overflow: hidden;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
            touch-action: pan-y;
        }

        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(100px);
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
        }

        .page.active {
            opacity: 1 !important;
            transform: translateY(0) !important;
            z-index: 10;
        }

        .page.prev {
            transform: translateY(-100px);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 70%);
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 5;
            text-align: center;
            max-width: 90%;
            padding: 20px;
            color: #fff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.9);
        }

        .title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            margin-bottom: 40px;
            background: linear-gradient(45deg, #ff6b9d, #ff8fb2, #ffb3d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 10px #ff6b9d); }
            100% { filter: drop-shadow(0 0 30px #ff6b9d); }
        }

        .text-line {
            font-size: clamp(1.8rem, 6vw, 3rem);
            line-height: 1.3;
            margin: 25px 0;
            opacity: 0;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
        }

        .text-line.typing {
            border-right: 4px solid #ff6b9d;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 50% { border-color: #ff6b9d; }
            51%, 100% { border-color: transparent; }
        }

        .photo {
            width: 95%;
            height: 95%;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            animation: photoZoom 10s infinite ease-in-out;
        }

        @keyframes photoZoom {
            0%, 100% { transform: scale(1.02) rotate(0deg); }
            25% { transform: scale(1.06) rotate(1deg); }
            50% { transform: scale(1.04) rotate(0deg); }
            75% { transform: scale(1.07) rotate(-1deg); }
        }

        video {
            width: 85%;
            max-width: 900px;
            height: 75%;
            object-fit: cover;
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.9);
        }

        .cake-container {
            position: relative;
            width: 70%;
            height: 60%;
            margin: 20px 0;
        }

        .cake {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 30px;
        }

        .cake-slice {
            position: absolute;
            width: 25%;
            height: 40%;
            background: linear-gradient(45deg, #ff6b9d, #ffb3d1);
            border-radius: 50% 50% 0 0;
            bottom: 20%;
            right: 10%;
            transform-origin: bottom left;
            animation: cakeCut 4s ease-in-out infinite;
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%);
        }

        @keyframes cakeCut {
            0%, 70% { transform: rotate(0deg); }
            80% { transform: rotate(-30deg); }
            100% { transform: rotate(-45deg); }
        }

        .candles {
            position: absolute;
            top: -10%;
            left: 20%;
            width: 60%;
            height: 20%;
            display: flex;
            justify-content: space-around;
        }

        .candle {
            width: 12px;
            height: 40px;
            background: linear-gradient(to top, #f4a261, #e76f51);
            border-radius: 6px 6px 0 0;
            position: relative;
        }

        .flame {
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 12px;
            background: radial-gradient(circle, #ffeb3b, #ff9800);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.5s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(1deg); }
        }

        .final-content {
            padding: 50px 30px;
            max-width: 100%;
        }

        .final-title {
            font-size: clamp(4rem, 12vw, 8rem) !important;
            font-weight: 900;
            margin: 30px 0;
            color: #ff6b9d !important;
            text-shadow: 0 0 40px #ff6b9d;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .nav {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 25px;
        }

        .nav-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255,107,157,0.6);
            color: #ff6b9d;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-family: inherit;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255,107,157,0.4);
            transform: scale(1.08) translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,157,0.5);
            border-color: #ff6b9d;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .music-toggle {
            position: fixed;
            top: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 3px solid #ff6b9d;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 1.8rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.4s ease;
            font-weight: bold;
        }

        .music-toggle:hover {
            background: rgba(255,107,157,0.4);
            transform: scale(1.15) rotate(180deg);
            box-shadow: 0 10px 30px rgba(255,107,157,0.5);
        }

        .music-toggle.playing::before {
            content: "🎵";
            animation: musicSpin 2s linear infinite;
        }

        .music-toggle.paused::before {
            content: "🔇";
        }

        @keyframes musicSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
        }

        .heart {
            position: absolute;
            font-size: clamp(16px, 3vw, 28px);
            color: #ff6b9d;
            pointer-events: none;
            animation: floatHeart 8s infinite linear;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) translateX(100px) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        .progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 6px;
            background: linear-gradient(90deg, #ff6b9d, #ff8fb2, #ffb3d1);
            z-index: 1000;
            box-shadow: 0 0 20px #ff6b9d;
            transition: width 0.5s ease;
        }

        @media (max-width: 768px) {
            .nav { bottom: 25px; gap: 15px; }
            .nav-btn { padding: 15px 25px; font-size: 1rem; }
            video { width: 92%; height: 70%; }
            .photo { width: 98%; height: 98%; }
        }
    </style>
</head>
